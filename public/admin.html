<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <title>Admin Panel - Web Game</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            padding: 20px;
        }

        .admin-container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .section {
            margin-top: 25px;
            padding: 20px;
            background: #fafafa;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        input, button {
            padding: 10px;
            font-size: 15px;
            border-radius: 8px;
        }

        button {
            background: #667eea;
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5568d8;
        }

        input {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
        }

        .user-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .user-list th, .user-list td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        .success {
            background: #e8ffe8;
            color: #2a7a2a;
        }

        .error {
            background: #ffe8e8;
            color: #a82a2a;
        }
    </style>
</head>

<body>
    <div class="admin-container">

        <h1>🛡️ Admin Dashboard</h1>
        <p style="text-align: center; color: #666;">No token required — full admin access</p>

        <!-- Section: Reset Player -->
        <div class="section">
            <h2>Reset Player Stats</h2>
            <input type="text" id="resetUser" placeholder="Enter username">
            <button onclick="resetPlayer()">Reset</button>
            <div id="resetMsg" class="message"></div>
        </div>

        <!-- Section: Add Balance -->
        <div class="section">
            <h2>Add Balance</h2>
            <input type="text" id="creditUser" placeholder="Username">
            <input type="number" id="creditAmount" placeholder="Amount">
            <button onclick="addBalance()">Add Balance</button>
            <div id="creditMsg" class="message"></div>
        </div>

        <!-- Section: Reduce Balance -->
        <div class="section">
            <h2>Deduct Balance</h2>
            <input type="text" id="deductUser" placeholder="Username">
            <input type="number" id="deductAmount" placeholder="Amount">
            <button onclick="deductBalance()">Deduct</button>
            <div id="deductMsg" class="message"></div>
        </div>

        <!-- Section: View Users -->
        <div class="section">
            <h2>All Users</h2>
            <button onclick="loadUsers()">Load Users</button>
            <table class="user-list" id="userTable"></table>
        </div>

    </div>

    <script>
        function showMessage(el, text, isError = false) {
            el.style.display = "block";
            el.textContent = text;
            el.className = "message " + (isError ? "error" : "success");

            setTimeout(() => {
                el.style.display = "none";
            }, 3000);
        }

        // Reset player
        async function resetPlayer() {
            const username = document.getElementById('resetUser').value;
            const msg = document.getElementById('resetMsg');

            const res = await fetch('/admin/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });

            const data = await res.json();
            showMessage(msg, data.message || "Done", !res.ok);
        }

        // Add balance
        async function addBalance() {
            const username = document.getElementById('creditUser').value;
            const amount = Number(document.getElementById('creditAmount').value);
            const msg = document.getElementById('creditMsg');

            const res = await fetch('/admin/addbalance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, amount })
            });

            const data = await res.json();
            showMessage(msg, data.message || "Done", !res.ok);
        }

        // Deduct balance
        async function deductBalance() {
            const username = document.getElementById('deductUser').value;
            const amount = Number(document.getElementById('deductAmount').value);
            const msg = document.getElementById('deductMsg');

            const res = await fetch('/admin/deductbalance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, amount })
            });

            const data = await res.json();
            showMessage(msg, data.message || "Done", !res.ok);
        }

        // Load users
        async function loadUsers() {
            const table = document.getElementById('userTable');
            table.innerHTML = "<tr><th>Username</th><th>Balance</th><th>Wins</th><th>Losses</th></tr>";

            const res = await fetch('/admin/users');
            const data = await res.json();

            data.forEach(u => {
                table.innerHTML += `
                    <tr>
                        <td>${u.username}</td>
                        <td>$${u.balance.toFixed(2)}</td>
                        <td>${u.wins}</td>
                        <td>${u.losses}</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
