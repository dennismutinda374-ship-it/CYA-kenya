<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#667eea">
  <title>Leaderboard - Web Game</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #f5f5f5;
      padding: 20px;
    }

    .leaderboard-container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .leaderboard-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    .leaderboard-header h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 32px);
    }

    .sort-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
      border-bottom: 2px solid #e0e0e0;
    }

    .sort-btn {
      padding: 10px 20px;
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: clamp(12px, 3vw, 14px);
      transition: all 0.3s;
    }

    .sort-btn:hover, .sort-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .leaderboard-list {
      padding: 20px;
    }

    .leaderboard-item {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 15px;
      align-items: center;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      margin-bottom: 10px;
      transition: all 0.3s;
    }

    .leaderboard-item:hover {
      transform: translateX(5px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .leaderboard-item.gold {
      border-left-color: #ffc107;
      background: rgba(255, 193, 7, 0.05);
    }

    .leaderboard-item.silver {
      border-left-color: #c0c0c0;
      background: rgba(192, 192, 192, 0.05);
    }

    .leaderboard-item.bronze {
      border-left-color: #cd7f32;
      background: rgba(205, 127, 50, 0.05);
    }

    .rank-badge {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: clamp(20px, 5vw, 28px);
      flex-shrink: 0;
    }

    .leaderboard-item.gold .rank-badge {
      background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
    }

    .leaderboard-item.silver .rank-badge {
      background: linear-gradient(135deg, #e0e0e0 0%, #bdbdbd 100%);
      color: #333;
    }

    .leaderboard-item.bronze .rank-badge {
      background: linear-gradient(135deg, #cd7f32 0%, #a0652f 100%);
    }

    .leaderboard-info h3 {
      margin: 0 0 5px 0;
      font-size: clamp(14px, 3.5vw, 16px);
      color: #333;
    }

    .leaderboard-info p {
      margin: 0;
      color: #666;
      font-size: clamp(12px, 3vw, 13px);
    }

    .leaderboard-stats {
      display: flex;
      gap: 20px;
      text-align: right;
      font-size: clamp(12px, 3vw, 14px);
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      color: #666;
      font-size: 11px;
      margin-bottom: 3px;
    }

    .stat-value {
      font-weight: 700;
      color: #333;
      font-size: clamp(14px, 3.5vw, 16px);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 16px;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: rgba(0,0,0,0.2);
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .close-btn:hover {
      background: rgba(0,0,0,0.4);
    }

    @media (max-width: 1024px) {
      .leaderboard-container {
        margin: 0 10px;
        border-radius: 8px;
      }

      .leaderboard-header {
        padding: 20px 15px;
      }

      .leaderboard-header h1 {
        font-size: 24px;
      }

      .sort-controls {
        padding: 15px;
        gap: 8px;
      }

      .sort-btn {
        padding: 8px 15px;
        font-size: 12px;
      }

      .leaderboard-list {
        padding: 15px;
      }

      .leaderboard-item {
        gap: 12px;
        padding: 12px;
        margin-bottom: 8px;
      }

      .rank-badge {
        width: 55px;
        height: 55px;
        font-size: 24px;
      }
    }

    @media (max-width: 768px) {
      .leaderboard-container {
        margin: 0;
        border-radius: 0;
        min-height: 100vh;
      }

      body {
        padding: 0;
      }

      .leaderboard-header {
        padding: 20px 15px;
      }

      .sort-controls {
        flex-direction: row;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding: 12px;
        gap: 8px;
      }

      .sort-btn {
        white-space: nowrap;
        flex-shrink: 0;
        padding: 8px 12px;
        font-size: 12px;
      }

      .leaderboard-list {
        padding: 12px;
      }

      .leaderboard-item {
        grid-template-columns: 50px 1fr;
        gap: 10px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .rank-badge {
        width: 50px;
        height: 50px;
        font-size: 20px;
        flex-shrink: 0;
      }

      .leaderboard-info {
        min-width: 0;
      }

      .leaderboard-info h3 {
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .leaderboard-stats {
        grid-column: 1 / -1;
        gap: 12px;
        margin-top: 8px;
        border-top: 1px solid #e0e0e0;
        padding-top: 8px;
        justify-content: flex-start;
      }

      .stat {
        flex-direction: row;
        gap: 5px;
        align-items: center;
      }

      .stat-label {
        margin-bottom: 0;
        min-width: 45px;
      }
    }

    @media (max-width: 480px) {
      .leaderboard-header {
        padding: 15px 12px;
      }

      .leaderboard-header h1 {
        font-size: 22px;
      }

      .leaderboard-header p {
        font-size: 13px;
      }

      .sort-controls {
        padding: 10px 8px;
        gap: 6px;
      }

      .sort-btn {
        padding: 6px 10px;
        font-size: 11px;
      }

      .leaderboard-list {
        padding: 8px;
      }

      .leaderboard-item {
        padding: 10px;
        margin-bottom: 8px;
        gap: 8px;
      }

      .rank-badge {
        width: 45px;
        height: 45px;
        font-size: 18px;
      }

      .leaderboard-info h3 {
        font-size: 13px;
      }

      .leaderboard-info p {
        font-size: 11px;
      }

      .leaderboard-stats {
        gap: 10px;
      }

      .stat-label {
        font-size: 10px;
      }

      .stat-value {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="leaderboard-container">
    <div class="leaderboard-header">
      <h1>🏆 Leaderboard</h1>
      <p style="margin: 10px 0 0 0; opacity: 0.9;">Top Players Rankings</p>
    </div>

    <div class="sort-controls">
      <button class="sort-btn active" onclick="loadLeaderboard('wins')">⭐ Top Wins</button>
      <button class="sort-btn" onclick="loadLeaderboard('balance')">💰 Top Balance</button>
      <button class="sort-btn" onclick="loadLeaderboard('games')">🎮 Most Games</button>
    </div>

    <div class="leaderboard-list" id="leaderboardList">
      <div class="loading">Loading leaderboard...</div>
    </div>
  </div>

  <script>
    let currentSort = 'wins';

    document.addEventListener('DOMContentLoaded', () => {
      // Check if user is logged in
      const authToken = localStorage.getItem('authToken');
      const userRole = localStorage.getItem('userRole');
      const username = localStorage.getItem('username');
      
      loadLeaderboard('wins', authToken);
    });

    async function loadLeaderboard(sortBy, authToken = null) {
      currentSort = sortBy;
      
      try {
        const headers = {};
        if (authToken) {
          headers['Authorization'] = `Bearer ${authToken}`;
        }
        
        const response = await fetch(`/api/leaderboard?sortBy=${sortBy}&limit=100`, {
          headers: headers
        });
        const data = await response.json();

        if (!response.ok) throw new Error(data.error);

        const html = data.leaderboard.map((user, index) => {
          let medalClass = '';
          if (index === 0) medalClass = 'gold';
          else if (index === 1) medalClass = 'silver';
          else if (index === 2) medalClass = 'bronze';

          return `
            <div class="leaderboard-item ${medalClass}">
              <div class="rank-badge">${user.rank}</div>
              <div class="leaderboard-info">
                <h3>${user.username}</h3>
                <p>Joined: ${new Date(user.joinDate).toLocaleDateString()}</p>
              </div>
              <div class="leaderboard-stats">
                <div class="stat">
                  <span class="stat-label">Wins</span>
                  <span class="stat-value">${user.wins}</span>
                </div>
                <div class="stat">
                  <span class="stat-label">Games</span>
                  <span class="stat-value">${user.games}</span>
                </div>
                <div class="stat">
                  <span class="stat-label">Balance</span>
                  <span class="stat-value">$${user.balance.toFixed(2)}</span>
                </div>
              </div>
            </div>
          `;
        }).join('');

        document.getElementById('leaderboardList').innerHTML = html || '<div class="loading">No players yet</div>';

        // Update active button
        document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
      } catch (error) {
        document.getElementById('leaderboardList').innerHTML = `<div class="loading" style="color: #e74c3c;">Error loading leaderboard</div>`;
      }
    }
  </script>
</body>
</html>
